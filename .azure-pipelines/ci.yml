# Azure DevOps CI Pipeline for Opinionated.DotNet.CodingStandards
pool:
  vmImage: 'windows-latest'

pr:
  autoCancel: true
  branches:
    include:
      - main
  drafts: false

# Don't trigger CI builds on pushes to any branch, only on PRs. This avoids unnecessary
# builds when merging PRs. 
trigger: none

variables:
  buildConfiguration: 'Release'
  dotnetSdkVersion: '10.x'
  solutionFileName: 'Opinionated.DotNet.CodingStandards.slnx'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

stages:
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: BuildJob
    displayName: 'Build, Test, and Pack'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        version: $(dotnetSdkVersion)
        includePreviewVersions: true

    - script: |
        echo "Installing dotnet-outdated global tool..."
        dotnet tool install --global dotnet-outdated-tool || dotnet tool update --global dotnet-outdated-tool
        echo "dotnet-outdated installation completed"
      displayName: 'Install dotnet-outdated global tool'

    - task: Cache@2
      displayName: 'Cache NuGet packages'
      inputs:
        key: 'nuget | "$(Agent.OS)" | Directory.Packages.props | **/*.csproj'
        restoreKeys: |
          nuget | "$(Agent.OS)" | Directory.Packages.props
          nuget | "$(Agent.OS)"
        path: '$(UserProfile)\.nuget\packages'

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '$(solutionFileName)'

    - script: |
        echo "Checking for outdated packages..."
        dotnet outdated $(solutionFileName) --fail-on-updates
        echo "Package version check completed"
      displayName: 'Check for outdated packages'

    - script: |
        echo "Checking NuGet dependencies match packages versions..."
        dotnet ./scripts/CheckNugetDependenciesMatchProps.cs
        echo "NuGet dependencies version check completed"
      displayName: 'Check for outdated dependencies in NuGet package'

    - task: DotNetCoreCLI@2
      displayName: 'Build solution'
      inputs:
        command: 'build'
        projects: '$(solutionFileName)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - script: |
        echo "Regenerating rule reference..."
        dotnet ./scripts/GenerateRuleReference.cs
        echo "Checking rule reference is up to date..."
        git diff --exit-code docs/
        echo "Rule reference freshness check completed"
      displayName: 'Regenerate and diff rule reference'

    - task: DotNetCoreCLI@2
      displayName: 'Run tests'
      inputs:
        command: 'test'
        projects: '$(solutionFileName)'
        arguments: '--configuration $(buildConfiguration) --no-build'
        publishTestResults: true

    - task: DotNetCoreCLI@2
      displayName: 'Pack NuGet package'
      inputs:
        command: 'pack'
        packagesToPack: '$(solutionFileName)'
        configuration: $(buildConfiguration)
        nobuild: true
        versioningScheme: 'off'
        outputDir: '$(Build.ArtifactStagingDirectory)/packages'
