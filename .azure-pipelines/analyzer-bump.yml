# Azure DevOps pipeline — triggered on analyzer version-bump PRs.
# Regenerates the editorconfigs and rule reference, commits any changes
# back to the PR source branch (skipped when nothing changed), then builds
# and runs the tests so newly added rules surface as failing coverage tests.
pool:
  vmImage: 'windows-latest'

pr:
  autoCancel: true
  branches:
    include:
      - main
  paths:
    include:
      - Directory.Packages.props
      - packages/Opinionated.DotNet.CodingStandards/Opinionated.DotNet.CodingStandards.nuspec
  drafts: false

trigger: none

variables:
  buildConfiguration: 'Release'
  dotnetSdkVersion: '10.x'
  solutionFileName: 'Opinionated.DotNet.CodingStandards.slnx'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

stages:
- stage: Regen
  displayName: 'Regenerate and commit back'
  jobs:
  - job: RegenJob
    displayName: 'Regenerate editorconfigs and rule reference'
    steps:
    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - powershell: |
        $branchName = "$(System.PullRequest.SourceBranch)" -replace "^refs/heads/", ""
        Write-Host "Checking out PR source branch: $branchName"
        git fetch origin "refs/heads/$($branchName):refs/heads/$($branchName)"
        git checkout $branchName
      displayName: 'Checkout PR source branch'

    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        version: $(dotnetSdkVersion)
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '$(solutionFileName)'

    - script: |
        echo "Regenerating analyzer editorconfigs..."
        dotnet ./scripts/UpdateAnalyzerEditorConfigs.cs
        echo "Editorconfig regeneration completed"
      displayName: 'Regenerate analyzer editorconfigs'

    - script: |
        echo "Regenerating rule reference..."
        dotnet ./scripts/GenerateRuleReference.cs
        echo "Rule reference regeneration completed"
      displayName: 'Regenerate rule reference'

    - powershell: |
        $changed = git status --porcelain
        if (-not $changed) {
          Write-Host "No changes detected — nothing to commit."
          exit 0
        }
        Write-Host "Changes detected:"
        Write-Host $changed

        git config user.email "azure-pipeline@noreply.github.com"
        git config user.name "Azure Pipelines [bot]"
        git add packages/Opinionated.DotNet.CodingStandards/pkgsrc/config/analyzers/
        git add docs/
        git commit -m "chore: regenerate editorconfigs and rule reference"

        $branchName = "$(System.PullRequest.SourceBranch)" -replace "^refs/heads/", ""
        git push origin "HEAD:refs/heads/$branchName"
        Write-Host "Pushed regenerated files to $branchName"
      displayName: 'Commit regenerated files to PR branch'

- stage: Build
  displayName: 'Build and Test'
  dependsOn: Regen
  jobs:
  - job: BuildJob
    displayName: 'Build and Test'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        version: $(dotnetSdkVersion)
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '$(solutionFileName)'

    - task: DotNetCoreCLI@2
      displayName: 'Build solution'
      inputs:
        command: 'build'
        projects: '$(solutionFileName)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Run tests'
      inputs:
        command: 'test'
        projects: '$(solutionFileName)'
        arguments: '--configuration $(buildConfiguration) --no-build'
        publishTestResults: true
