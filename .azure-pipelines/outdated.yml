# Azure DevOps scheduled pipeline — checks for outdated NuGet packages.
# Runs on a weekly schedule so the maintainer learns about stale dependencies
# between commits, without touching the per-commit gate in ci.yml.
pool:
  vmImage: 'windows-latest'

schedules:
- cron: '0 8 * * 1'
  displayName: 'Weekly Monday 08:00 UTC'
  branches:
    include:
      - main
  always: true

trigger: none
pr: none

variables:
  dotnetSdkVersion: '10.x'
  solutionFileName: 'Opinionated.DotNet.CodingStandards.slnx'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

stages:
- stage: OutdatedCheck
  displayName: 'Outdated packages check'
  jobs:
  - job: OutdatedJob
    displayName: 'Check for outdated packages'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        version: $(dotnetSdkVersion)
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '$(solutionFileName)'

    - script: |
        echo "Installing dotnet-outdated global tool..."
        dotnet tool install --global dotnet-outdated-tool || dotnet tool update --global dotnet-outdated-tool
        echo "dotnet-outdated installation completed"
      displayName: 'Install dotnet-outdated global tool'

    - script: |
        echo "Checking for outdated packages..."
        dotnet outdated $(solutionFileName)
        echo "Outdated package check completed"
      displayName: 'Report outdated packages'
