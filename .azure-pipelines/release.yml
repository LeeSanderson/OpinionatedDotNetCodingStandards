# Azure DevOps release pipeline for Opinionated.DotNet.CodingStandards.
# Triggered by pushing a v* tag (e.g. v1.2.3).
# Builds, tests, packs with the tag version, then publishes to NuGet.org.
pool:
  vmImage: 'windows-latest'

trigger:
  branches:
    exclude:
      - "*"
  tags:
    include:
      - "v*"

pr: none

variables:
  - group: SharedVariables
  - name: buildConfiguration
    value: 'Release'
  - name: dotnetSdkVersion
    value: '10.x'
  - name: solutionFileName
    value: 'Opinionated.DotNet.CodingStandards.slnx'
  - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
    value: true
  - name: DOTNET_CLI_TELEMETRY_OPTOUT
    value: true

stages:
- stage: Release
  displayName: 'Release'
  jobs:
  - job: ReleaseJob
    displayName: 'Build, Test, Pack, and Publish'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        version: $(dotnetSdkVersion)
        includePreviewVersions: true

    - task: Cache@2
      displayName: 'Cache NuGet packages'
      inputs:
        key: 'nuget | "$(Agent.OS)" | Directory.Packages.props | **/*.csproj'
        restoreKeys: |
          nuget | "$(Agent.OS)" | Directory.Packages.props
          nuget | "$(Agent.OS)"
        path: '$(UserProfile)\.nuget\packages'

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '$(solutionFileName)'

    - powershell: |
        $PackageVersion = "$(Build.SourceBranch)" -replace "refs/tags/v", ""
        Write-Host "##vso[task.setvariable variable=PackageVersion]$PackageVersion"
        Write-Host "Package version: $PackageVersion"
      displayName: 'Extract PackageVersion from tag'

    - task: DotNetCoreCLI@2
      displayName: 'Build solution'
      inputs:
        command: 'build'
        projects: '$(solutionFileName)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Run tests'
      inputs:
        command: 'test'
        projects: '$(solutionFileName)'
        arguments: '--configuration $(buildConfiguration) --no-build'
        publishTestResults: true

    - powershell: |
        dotnet pack src/Opinionated.DotNet.CodingStandards/Opinionated.DotNet.CodingStandards.csproj `
          --configuration $(buildConfiguration) `
          --no-build `
          -p:NuspecProperties=version=$(PackageVersion) `
          --output "$(Build.ArtifactStagingDirectory)\packages"
      displayName: 'Pack NuGet package'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish package artifact'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/packages'
        artifactName: 'packages'

    - powershell: |
        $package = Get-Item "$(Build.ArtifactStagingDirectory)\packages\*.nupkg"
        dotnet nuget push $package.FullName --api-key $(NuGetApiKey) --source https://api.nuget.org/v3/index.json --skip-duplicate
      displayName: 'Publish to NuGet.org'
