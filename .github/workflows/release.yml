# GitHub Actions release workflow for Opinionated.DotNet.CodingStandards.
#
# Replaces the Azure DevOps release.yml. Triggered by pushing a v* tag (e.g. v1.2.3),
# it builds, tests, packs with the tag's version, uploads the .nupkg as an artifact, and
# publishes to NuGet.org. The package version is derived from the tag name (the leading
# `v` stripped) — the tag is the single source of truth for the release version, matching
# what scripts/New-ReleaseTag.ps1 produces.
name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege: the release job only reads the repository; it never writes to it.
permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  release:
    name: release
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK (honours global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Faithful port of Azure Cache@2: caches the user NuGet packages folder keyed on
      # Directory.Packages.props + all .csproj files (parity with ci.yml).
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # The tag is vMAJOR.MINOR.PATCH (see scripts/New-ReleaseTag.ps1). Strip the leading
      # `v` to get the package version. Read from $env:GITHUB_REF_NAME (not interpolated)
      # to keep the tag value out of the script body.
      - name: Derive package version from tag
        id: version
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Package version: $version"

      - name: Restore
        run: dotnet restore Opinionated.DotNet.CodingStandards.slnx

      - name: Build (Release)
        run: dotnet build Opinionated.DotNet.CodingStandards.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Opinionated.DotNet.CodingStandards.slnx --configuration Release --no-build

      - name: Pack (tag version)
        run: dotnet pack src/Opinionated.DotNet.CodingStandards/Opinionated.DotNet.CodingStandards.csproj --configuration Release --no-build -p:NuspecProperties=version=${{ steps.version.outputs.version }} --output artifacts/packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages/*.nupkg


      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
    
      # Push the package
      - name: Publish to NuGet.org
        run: dotnet nuget push artifacts/packages/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
